<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formulario de Contacto BTQ</title>
  <link rel="icon" href="assets/images/favicon.png" sizes="120x120" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
  <link href="../css/kabeli-style.css" rel="stylesheet">
  <link href="../css/transversales.css" rel="stylesheet">

  <style>
    /* Fondo */
    body {
      background-color: #3C0F48;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Contenedor del formulario */
    form {
      background-color: rgba(255, 255, 255, 0.2);
      padding: 40px;
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
    }

    /* Título */
    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 28px;
      font-weight: bold;
    }

    /* Estilos para los campos */
    label {
      font-weight: bold;
      margin-bottom: 5px;
      display: block;
      font-size: 16px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.3);
      color: #fff;
    }

    input:focus,
    textarea:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.4);
    }

    textarea {
      resize: none;
      height: 120px;
    }

    /* Botón de envío */
    button {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background-color: #FCA311;
      color: #3C0F48;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background-color: #FFBA08;
      transform: scale(1.05);
    }

    /* Mensaje de confirmación */
    .mensaje-exito {
      display: none;
      text-align: center;
      background: rgba(0, 255, 0, 0.2);
      padding: 15px;
      border-radius: 8px;
      color: #fff;
      font-weight: bold;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <form id="contactoForm" action="https://formspree.io/f/manqgvqr" method="POST">
    <h2>Contáctanos</h2>

    <label for="email">Correo Electrónico:</label>
    <input type="email" id="email" name="email" required>

    <label for="message">Mensaje:</label>
    <textarea id="message" name="message" required></textarea>

    <button type="submit">Enviar</button>

    <!-- Mensaje de éxito -->
    <p class="mensaje-exito" id="mensajeExito">¡Gracias por contactarnos! Te responderemos pronto.</p>
  </form>

  <script>
    document.getElementById("contactoForm").addEventListener("submit", function (event) {
      event.preventDefault();
      const form = event.target;
      const mensajeExito = document.getElementById("mensajeExito");

      fetch(form.action, {
        method: form.method,
        body: new FormData(form),
        headers: { "Accept": "application/json" }
      }).then(response => {
        if (response.ok) {
          mensajeExito.style.display = "block"; // Muestra mensaje de éxito
          form.reset();
          setTimeout(() => mensajeExito.style.display = "none", 5000); // Oculta después de 5s
        } else {
          alert("Error al enviar el mensaje. Inténtalo de nuevo.");
        }
      }).catch(error => alert("Error: " + error));
    });
  </script>

</body>

</html>
